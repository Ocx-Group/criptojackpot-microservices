syntax = "proto3";

option csharp_namespace = "CryptoJackpot.Domain.Core.Protos";

package ticket_search;

// Service exposed by Order to search tickets for winner determination.
service TicketSearchGrpcService {
  // Searches for a sold ticket by lottery, number and series.
  rpc SearchTicket (SearchTicketRequest) returns (SearchTicketResponse);
}

message SearchTicketRequest {
  string lottery_id = 1;
  int32 number = 2;
  int32 series = 3;
}

message SearchTicketResponse {
  bool found = 1;
  string ticket_guid = 2;
  int64 user_id = 3;
  string status = 4;
  string purchase_amount = 5;
  string purchase_date = 6;
  string user_name = 7;
  string user_email = 8;
  string transaction_id = 9;
}
