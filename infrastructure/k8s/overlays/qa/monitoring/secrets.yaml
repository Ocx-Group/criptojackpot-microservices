# Grafana Cloud Secret — QA monitoring overlay
# Inyectar via CI/CD — no commitear valores reales
apiVersion: v1
kind: Secret
metadata:
  name: grafana-cloud-secrets
  namespace: monitoring
type: Opaque
stringData:
  GRAFANA_INSTANCE_ID: "REPLACE_WITH_GRAFANA_INSTANCE_ID"
  GRAFANA_API_KEY: "REPLACE_WITH_GRAFANA_API_KEY"
  GRAFANA_TEMPO_ENDPOINT: "https://tempo-prod-30-prod-us-east-3.grafana.net:443"
  GRAFANA_PROMETHEUS_ENDPOINT: "https://prometheus-prod-66-prod-us-east-3.grafana.net/api/prom/push"
  GRAFANA_LOKI_ENDPOINT: "https://logs-prod-042.grafana.net"

