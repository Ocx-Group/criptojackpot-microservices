# Kustomization for PRODUCTION environment
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: criptojackpot

resources:
  - ../../base
  - ../../base/infrastructure/redpanda
  - secrets
  - pgbouncer
  - jobs

# PROD uses:
# - DigitalOcean Managed PostgreSQL (via PgBouncer)
# - DigitalOcean Managed Redis
# - Redpanda (Kafka-compatible, pod interno en el cluster)
# - DigitalOcean Spaces
# - MongoDB Atlas

patches:
  # Identity API - replicas, resources, security
  - target:
      kind: Deployment
      name: identity-api
    patch: |-
      - op: add
        path: /spec/replicas
        value: 2
      - op: add
        path: /spec/template/spec/securityContext
        value:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          fsGroup: 1000
      - op: add
        path: /spec/template/spec/containers/0/securityContext
        value:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"

  # Lottery API
