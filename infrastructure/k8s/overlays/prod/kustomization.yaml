          runAsGroup: 1000
          fsGroup: 1000
      - op: add
        path: /spec/template/spec/containers/0/securityContext
        value:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"

  # imagePullSecrets for all Deployments â€” needed to pull from private DOCR
  - target:
      kind: Deployment
    patch: |-
      - op: add
        path: /spec/template/spec/imagePullSecrets
        value:
          - name: registry-criptojackpot


  # BFF Ingress - Ãºnico punto de entrada externo (api.criptojackpot.com) - Ãºnico punto de entrada externo (api.criptojackpot.com)
  # Flujo: Frontend â†’ Cloudflare (TLS terminado) â†’ BFF Ingress (HTTP interno)
  # Cloudflare gestiona el certificado TLS externo; dentro del cluster es HTTP plano.
  # Rate limiting aplicado a nivel de nginx como capa extra de defensa.
  - target:
      kind: Ingress
      name: bff-ingress
    patch: |-
      - op: add
        path: /metadata/annotations/nginx.ingress.kubernetes.io~1use-forwarded-headers
        value: "true"
      - op: add
        path: /metadata/annotations/nginx.ingress.kubernetes.io~1forwarded-for-header
        value: "CF-Connecting-IP"
      - op: add
        path: /metadata/annotations/nginx.ingress.kubernetes.io~1limit-rps
        value: "100"
      - op: add
        path: /metadata/annotations/nginx.ingress.kubernetes.io~1limit-connections
        value: "50"
      - op: replace
        path: /spec/rules
        value:
          - host: api.criptojackpot.com
            http:
              paths:
                - path: /api
                  pathType: Prefix
                  backend:
                    service:
                      name: bff-gateway
                      port:
                        number: 80
                - path: /lottery-hub
                  pathType: Prefix
                  backend:
                    service:
                      name: bff-gateway
                      port:
                        number: 80
                - path: /health
                  pathType: Prefix
                  backend:
                    service:
                      name: bff-gateway
                      port:
                        number: 80

  # OTel Collector patch moved to overlays/prod/monitoring/kustomization.yaml

# ConfigMap for Production environment
configMapGenerator:
  - name: app-config
    literals:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - Logging__LogLevel__Default=Warning
      - Logging__LogLevel__Microsoft.AspNetCore=Warning
      - Cors__AllowedOrigins__0=https://criptojackpot.com
      - Cors__AllowedOrigins__1=https://www.criptojackpot.com
      - Cors__AllowedOrigins__2=https://app.criptojackpot.com
      - KAFKA_BOOTSTRAP_SERVERS=redpanda.criptojackpot.svc.cluster.local:9092
      - OpenTelemetry__Endpoint=http://otel-collector.monitoring.svc.cluster.local:4317
      - OpenTelemetry__Enabled=true

generatorOptions:
  disableNameSuffixHash: true

images:
  - name: cryptojackpot/migrator
    newName: registry.digitalocean.com/criptojackpot/migrator
    newTag: prod-aef911d
  - name: cryptojackpot/bff-gateway
    newName: registry.digitalocean.com/criptojackpot/bff-gateway
    newTag: prod-aef911d
  - name: cryptojackpot/identity-api
