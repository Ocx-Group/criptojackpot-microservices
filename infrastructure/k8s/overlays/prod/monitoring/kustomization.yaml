# Kustomization for PROD monitoring overlay
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/infrastructure/monitoring
  - secrets.yaml

patches:
  # OTel Collector — 2 réplicas en prod para HA
  - target:
      kind: Deployment
      name: otel-collector
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi

