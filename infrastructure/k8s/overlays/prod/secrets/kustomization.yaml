# Kustomization for Production secrets
# Secrets are encrypted using Sealed Secrets (bitnami.com/v1alpha1)
# The sealed-secrets-controller in kube-system decrypts them into regular Secrets
# To update a secret: kubectl create secret generic <name> --dry-run=client --from-literal=KEY=VALUE -o yaml | kubeseal --format yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - jwt-secrets.yaml
  - postgres-secrets.yaml
  - kafka-secrets.yaml
  - mongodb-secrets.yaml
  - spaces-secrets.yaml
  - brevo-secrets.yaml
  - redis-secrets.yaml
  - google-secrets.yaml
  - coinpayments-secrets.yaml
