# Grafana Cloud Secret — PROD overlay
# Los valores reales se inyectan via CI/CD (GitHub Actions / env vars)
# NO editar manualmente en producción
apiVersion: v1
kind: Secret
metadata:
  name: grafana-cloud-secrets
  namespace: monitoring
type: Opaque
stringData:
  GRAFANA_INSTANCE_ID: "REPLACE_WITH_GRAFANA_INSTANCE_ID"
  GRAFANA_API_KEY: "REPLACE_WITH_GRAFANA_API_KEY"
  GRAFANA_TEMPO_ENDPOINT: "https://REPLACE.grafana.net:443"
  GRAFANA_PROMETHEUS_ENDPOINT: "https://REPLACE.grafana.net/api/prom/push"
  GRAFANA_LOKI_ENDPOINT: "https://REPLACE.grafana.net"

