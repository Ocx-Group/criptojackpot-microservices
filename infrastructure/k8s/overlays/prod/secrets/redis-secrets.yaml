# Secrets for PRODUCTION - Redis/Valkey (DigitalOcean Managed)
apiVersion: v1
kind: Secret
metadata:
  name: redis-secrets
  namespace: criptojackpot
type: Opaque
stringData:
  REDIS_CONNECTION_STRING: "REPLACE_WITH_PROD_REDIS_CONNECTION_STRING"
  REDIS_HOST: "REPLACE_WITH_PROD_REDIS_HOST"
  REDIS_PORT: "25061"
  REDIS_PASSWORD: "REPLACE_WITH_PROD_REDIS_PASSWORD"
  REDIS_SSL: "true"
