# Secrets for PRODUCTION - Kafka (Redpanda internal)
apiVersion: v1
kind: Secret
metadata:
  name: kafka-secrets
  namespace: criptojackpot
type: Opaque
stringData:
  KAFKA_BOOTSTRAP_SERVERS: "redpanda.criptojackpot.svc.cluster.local:9092"
  KAFKA_SASL_USERNAME: ""
  KAFKA_SASL_PASSWORD: ""
  KAFKA_SASL_MECHANISM: "PLAIN"
  KAFKA_SECURITY_PROTOCOL: "PLAINTEXT"
