# Secrets for PRODUCTION - DigitalOcean Spaces
apiVersion: v1
kind: Secret
metadata:
  name: digitalocean-spaces-secrets
  namespace: criptojackpot
type: Opaque
stringData:
  SPACES_ENDPOINT: "https://nyc3.digitaloceanspaces.com"
  SPACES_REGION: "nyc3"
  SPACES_BUCKET: "criptojackpot-prod-assets"
  SPACES_ACCESS_KEY: "REPLACE_WITH_PROD_SPACES_ACCESS_KEY"
  SPACES_SECRET_KEY: "REPLACE_WITH_PROD_SPACES_SECRET_KEY"
