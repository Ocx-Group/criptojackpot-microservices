# Secrets for PRODUCTION - MongoDB (DigitalOcean Managed)
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secrets
  namespace: criptojackpot
type: Opaque
stringData:
  MONGODB_ROOT_USERNAME: "doadmin"
  MONGODB_ROOT_PASSWORD: "REPLACE_WITH_PROD_MONGODB_PASSWORD"
  MONGODB_AUDIT_CONNECTION: "REPLACE_WITH_PROD_MONGODB_CONNECTION_STRING"
  MONGODB_AUDIT_DATABASE: "criptojackpot_audit"
