# Secrets for PRODUCTION - PostgreSQL (DigitalOcean Managed via PgBouncer)
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: criptojackpot
type: Opaque
stringData:
  # DigitalOcean Managed PostgreSQL (used by PgBouncer to connect upstream)
  POSTGRES_HOST: "REPLACE_WITH_PROD_POSTGRES_HOST"
  POSTGRES_PORT: "25060"
  POSTGRES_USER: "doadmin"
  POSTGRES_PASSWORD: "REPLACE_WITH_PROD_POSTGRES_PASSWORD"
  POSTGRES_SSLMODE: "require"
  # Connection strings via internal PgBouncer (no SSL client-side, pgbouncer handles SSL upstream)
  IDENTITY_DB_CONNECTION: "REPLACE_WITH_PROD_IDENTITY_DB_CONNECTION"
  LOTTERY_DB_CONNECTION: "REPLACE_WITH_PROD_LOTTERY_DB_CONNECTION"
  ORDER_DB_CONNECTION: "REPLACE_WITH_PROD_ORDER_DB_CONNECTION"
  WALLET_DB_CONNECTION: "REPLACE_WITH_PROD_WALLET_DB_CONNECTION"
  WINNER_DB_CONNECTION: "REPLACE_WITH_PROD_WINNER_DB_CONNECTION"
  NOTIFICATION_DB_CONNECTION: "REPLACE_WITH_PROD_NOTIFICATION_DB_CONNECTION"
