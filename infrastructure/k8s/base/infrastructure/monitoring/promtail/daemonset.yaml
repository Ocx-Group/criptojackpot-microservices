# Promtail DaemonSet — recolecta logs de todos los pods y los envía a Grafana Cloud Loki
# Corre en TODOS los nodos del cluster para capturar stdout/stderr de cada pod
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: monitoring
  labels:
    app: promtail
    app.kubernetes.io/name: promtail
    app.kubernetes.io/part-of: cryptojackpot-observability
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      tolerations:
        # Permite correr en nodos con taints (control-plane, etc.)
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: promtail
          image: grafana/promtail:3.3.2
          args:
            - "-config.file=/etc/promtail/config.yaml"
            - "-config.expand-env=true"
          env:
            - name: GRAFANA_INSTANCE_ID
              valueFrom:
                secretKeyRef:
                  name: grafana-cloud-secrets
                  key: GRAFANA_INSTANCE_ID
            - name: GRAFANA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: grafana-cloud-secrets
                  key: GRAFANA_API_KEY
            - name: GRAFANA_LOKI_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: grafana-cloud-secrets
                  key: GRAFANA_LOKI_ENDPOINT
            # Nombre del nodo para label k8s.node
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
              readOnly: true
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: run
              mountPath: /run/promtail
          ports:
            - name: http-metrics
              containerPort: 3101
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: run
          hostPath:
            path: /run/promtail
            type: DirectoryOrCreate
---
# Promtail ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: monitoring
  labels:
    app: promtail
data:
  config.yaml: |
    server:
      http_listen_port: 3101
      grpc_listen_port: 0
      log_level: warn

    positions:
      filename: /run/promtail/positions.yaml

    clients:
      - url: "${GRAFANA_LOKI_ENDPOINT}/loki/api/v1/push"
        basic_auth:
          username: "${GRAFANA_INSTANCE_ID}"
          password: "${GRAFANA_API_KEY}"
        tenant_id: cryptojackpot

    scrape_configs:
      # -----------------------------------------------------------------------
      # Captura logs de TODOS los pods del namespace cryptojackpot
      # -----------------------------------------------------------------------
      - job_name: cryptojackpot-pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ["cryptojackpot"]
        pipeline_stages:
          # Parsea JSON estructurado de los logs .NET
          - json:
              expressions:
                level: level
                message: message
                timestamp: timestamp
                service: Properties.ServiceName
                traceId: TraceId
                spanId: SpanId
          # Mapea el campo level a label de Loki
          - labels:
              level:
              service:
          # Usa el timestamp del log si está disponible
          - timestamp:
              source: timestamp
              format: RFC3339
          # Filtra líneas de health-check para reducir volumen
          - drop:
              expression: '.*GET /health.*'
          - drop:
              expression: '.*"url.path":"/health".*'
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node

      # -----------------------------------------------------------------------
      # Logs del namespace monitoring (otel-collector, promtail)
      # -----------------------------------------------------------------------
      - job_name: monitoring-pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ["monitoring"]
        pipeline_stages:
          - drop:
              expression: '.*level=debug.*'
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
---
# ServiceAccount para Promtail
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: monitoring
  labels:
    app: promtail
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail
  labels:
    app: promtail
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail
  labels:
    app: promtail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: monitoring

