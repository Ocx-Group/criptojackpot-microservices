# =============================================================================
# Grafana Cloud Secret — TEMPLATE (no contiene valores reales)
# =============================================================================
# NUNCA commitear con valores reales. Usar:
#   - Local: kubectl apply con valores reales (ver README)
#   - QA/Prod: CI/CD inyecta via TF_VAR_* o kubectl create secret
#
# Cómo obtener los valores desde Grafana Cloud:
#   1. https://grafana.com → tu stack → "Send metrics" / "Send traces" / "Send logs"
#   2. GRAFANA_INSTANCE_ID   = el número de usuario (ej: 123456)
#   3. GRAFANA_API_KEY       = el token generado (empieza con glc_...)
#   4. GRAFANA_TEMPO_ENDPOINT     = ej: https://tempo-prod-04-prod-us-east-0.grafana.net:443
#   5. GRAFANA_PROMETHEUS_ENDPOINT = ej: https://prometheus-prod-24-prod-us-east-0.grafana.net/api/prom/push
#   6. GRAFANA_LOKI_ENDPOINT      = ej: https://logs-prod-006.grafana.net
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: grafana-cloud-secrets
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: cryptojackpot-observability
type: Opaque
stringData:
  GRAFANA_INSTANCE_ID: "REPLACE_WITH_GRAFANA_INSTANCE_ID"
  GRAFANA_API_KEY: "REPLACE_WITH_GRAFANA_API_KEY"
  GRAFANA_TEMPO_ENDPOINT: "REPLACE_WITH_GRAFANA_TEMPO_ENDPOINT"
  GRAFANA_PROMETHEUS_ENDPOINT: "REPLACE_WITH_GRAFANA_PROMETHEUS_ENDPOINT"
  GRAFANA_LOKI_ENDPOINT: "REPLACE_WITH_GRAFANA_LOKI_ENDPOINT"

