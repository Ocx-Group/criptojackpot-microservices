# Base ConfigMap - Common settings across all environments
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: criptojackpot
data:
  ASPNETCORE_ENVIRONMENT: "Development"
  ASPNETCORE_URLS: "http://+:8080"
  Logging__LogLevel__Default: "Information"
  Logging__LogLevel__Microsoft.AspNetCore: "Warning"
  # Minutes a reservation/order stays valid for the user to complete payment
  ReservationSettings__ReservationMinutes: "120"
