# Identity API - Base Service
apiVersion: v1
kind: Service
metadata:
  name: identity-api
  namespace: criptojackpot
  labels:
    app: identity-api
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8080
    - name: grpc
      port: 5001
      targetPort: 5001
  selector:
    app: identity-api
