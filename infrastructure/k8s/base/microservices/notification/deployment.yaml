# Notification API - Base Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-api
  namespace: criptojackpot
  labels:
    app: notification-api
    tier: api
spec:
  selector:
    matchLabels:
      app: notification-api
  template:
    metadata:
      labels:
        app: notification-api
        tier: api
    spec:
      containers:
        - name: notification-api
          image: cryptojackpot/notification-api
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: NOTIFICATION_DB_CONNECTION
            - name: Kafka__BootstrapServers
              valueFrom:
                secretKeyRef:
                  name: kafka-secrets
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: Brevo__ApiKey
              valueFrom:
                secretKeyRef:
                  name: brevo-secrets
                  key: BREVO_API_KEY
            - name: Brevo__SenderEmail
              valueFrom:
                secretKeyRef:
                  name: brevo-secrets
                  key: BREVO_SENDER_EMAIL
            - name: Brevo__SenderName
              valueFrom:
                secretKeyRef:
                  name: brevo-secrets
                  key: BREVO_SENDER_NAME
            - name: Brevo__BaseUrl
              valueFrom:
                secretKeyRef:
                  name: brevo-secrets
                  key: BREVO_BASE_URL
            - name: ASPNETCORE_URLS
              value: "http://*:8080"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
