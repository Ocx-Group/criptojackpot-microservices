# Order API - Base Service
apiVersion: v1
kind: Service
metadata:
  name: order-api
  namespace: criptojackpot
  labels:
    app: order-api
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8080
    - name: grpc
      port: 5051
      targetPort: 5051
  selector:
    app: order-api
