# Wallet API - Base Service
apiVersion: v1
kind: Service
metadata:
  name: wallet-api
  namespace: criptojackpot
  labels:
    app: wallet-api
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8080
    - name: grpc
      port: 5052
      targetPort: 5052
  selector:
    app: wallet-api
